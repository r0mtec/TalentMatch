name: talentmatch

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - request-management-service
      - document-parser-service
      - skill-recognition-service
      - assessment-service
      - report-service

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "5173:5173"

  request-management-service:
    build:
      context: .
      dockerfile: backend/docker/laravel/Dockerfile
      args:
        SERVICE_PATH: backend/services/request-management-service
        INSTALL_S3: "true"
        INSTALL_REDIS: "true"
    environment:
      APP_NAME: TalentMatchRequestManagement
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8080}
      SESSION_DRIVER: file
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${POSTGRES_DB:-talentmatch}
      DB_USERNAME: ${POSTGRES_USER:-talentmatch}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-resumes}
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      DOCUMENT_PARSER_URL: http://document-parser-service:8000
      SKILL_RECOGNITION_URL: http://skill-recognition-service:8000
      ASSESSMENT_SERVICE_URL: http://assessment-service:8000
      REPORT_SERVICE_URL: http://report-service:8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started

  queue-worker:
    build:
      context: .
      dockerfile: backend/docker/laravel/Dockerfile
      args:
        SERVICE_PATH: backend/services/request-management-service
        INSTALL_S3: "true"
        INSTALL_REDIS: "true"
    command: php artisan queue:work --tries=3 --timeout=30
    environment:
      APP_NAME: TalentMatchQueueWorker
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      SESSION_DRIVER: file
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${POSTGRES_DB:-talentmatch}
      DB_USERNAME: ${POSTGRES_USER:-talentmatch}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-resumes}
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      - request-management-service
      - redis

  document-parser-service:
    build:
      context: .
      dockerfile: backend/docker/laravel/Dockerfile
      args:
        SERVICE_PATH: backend/services/document-parser-service
        INSTALL_PARSERS: "true"
    environment:
      APP_NAME: TalentMatchDocumentParser
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-15}
    ports:
      - "8001:8000"

  skill-recognition-service:
    build:
      context: .
      dockerfile: backend/docker/laravel/Dockerfile
      args:
        SERVICE_PATH: backend/services/skill-recognition-service
    environment:
      APP_NAME: TalentMatchSkillRecognition
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
    ports:
      - "8002:8000"

  assessment-service:
    build:
      context: .
      dockerfile: backend/docker/laravel/Dockerfile
      args:
        SERVICE_PATH: backend/services/assessment-service
    environment:
      APP_NAME: TalentMatchAssessment
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
    ports:
      - "8003:8000"

  report-service:
    build:
      context: .
      dockerfile: backend/docker/laravel/Dockerfile
      args:
        SERVICE_PATH: backend/services/report-service
        INSTALL_PDF: "true"
    environment:
      APP_NAME: TalentMatchReports
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-true}
    ports:
      - "8004:8000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-talentmatch}
      POSTGRES_USER: ${POSTGRES_USER:-talentmatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${AWS_BUCKET} &&
      mc anonymous set none local/$${AWS_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      AWS_BUCKET: ${AWS_BUCKET:-resumes}

volumes:
  postgres-data:
  minio-data:
